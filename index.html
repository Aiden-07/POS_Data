<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="system_title">POS数据管理平台</title>
  <!-- Tailwind CSS v3 via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- FontAwesome via CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Custom Style -->
  <link rel="stylesheet" href="style.css?v=20260706-org-cascader">
  <!-- Tailwind Config -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1d2129',
            secondary: '#4e5969',
            brand: '#165dff',
            'brand-light': '#f5f7fa'
          }
        }
      }
    }
  </script>
</head>
<body class="text-slate-900 font-sans min-h-screen flex flex-col overflow-hidden">
  
  <!-- Main Layout Wrapper (Hidden on Login) -->
  <div id="app-layout" class="hidden flex-1 h-screen app-shell">
    <aside id="sidebar" class="app-sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark">
          <i class="fa-solid fa-database"></i>
        </div>
        <div class="brand-copy">
          <span class="brand-title">POS DATA</span>
        </div>
        <button id="sidebar-collapse-toggle" class="sidebar-collapse-button" type="button" aria-label="折叠左侧目录" aria-expanded="true">
          <i class="fa-solid fa-angles-left"></i>
        </button>
      </div>

      <nav class="sidebar-nav" id="main-nav">
        <a href="#dashboard" class="nav-item">
          <i class="fa-solid fa-chart-line"></i>
          <span data-i18n="nav_dashboard">首页概览</span>
        </a>
        <a href="#ingestion" class="nav-item">
          <i class="fa-solid fa-file-import"></i>
          <span data-i18n="nav_ingestion">文件收取</span>
        </a>
        <a href="#qa" class="nav-item">
          <i class="fa-solid fa-shield-halved"></i>
          <span data-i18n="nav_qa">质量检查</span>
        </a>
        <a href="#ledger" class="nav-item">
          <i class="fa-solid fa-table-list"></i>
          <span data-i18n="nav_ledger">台账与汇总</span>
        </a>
        <a href="#analytics" class="nav-item">
          <i class="fa-solid fa-chart-pie"></i>
          <span>数据分析</span>
        </a>
        <div class="nav-group" id="settings-nav-group">
          <button id="settings-nav-toggle" class="nav-item nav-parent" type="button" aria-expanded="false">
            <i class="fa-solid fa-gear"></i>
            <span>系统设置</span>
            <i class="fa-solid fa-chevron-down nav-parent-chevron"></i>
          </button>
          <div class="subnav hidden" id="settings-subnav">
            <a href="#settings-users" class="subnav-item">用户管理</a>
            <a href="#settings-roles" class="subnav-item">角色管理</a>
            <a href="#settings-logs" class="subnav-item">系统日志</a>
          </div>
        </div>
      </nav>

    </aside>

    <div class="app-main">
      <!-- Top Action Bar -->
      <header class="app-header">
        <div class="flex items-center gap-4 min-w-0">
          <button id="sidebar-toggle" class="icon-button lg:hidden" aria-label="切换导航">
            <i class="fa-solid fa-bars"></i>
          </button>
          <div class="min-w-0">
            <h1 class="page-title" data-i18n="system_title">POS数据管理平台</h1>
          </div>
        </div>
        
        <div class="header-tools">
          <!-- View Specific Actions will be injected here -->
          <div id="view-actions" class="view-actions"></div>
          <div id="global-period-slot"></div>
          
          <!-- Language Toggle -->
          <button id="lang-toggle" class="soft-button">
            <i class="fa-solid fa-globe"></i>
            <span id="current-lang-text">CN</span>
          </button>
          <div class="user-menu-wrap">
            <button id="user-menu-btn" class="user-menu-button" type="button" aria-label="用户菜单" aria-expanded="false">
              <span class="user-avatar"><i class="fa-solid fa-user"></i></span>
              <span class="user-copy">
                <span id="header-user-name" class="user-name">Aiden</span>
                <span id="header-user-role" class="user-role">POS担当</span>
              </span>
              <i class="fa-solid fa-chevron-down user-chevron"></i>
            </button>
            <div id="user-menu-panel" class="user-menu-panel hidden">
              <button id="change-password-btn" class="user-menu-item" type="button">
                <i class="fa-solid fa-key"></i>
                <span>修改密码</span>
              </button>
              <button id="logout-btn" class="user-menu-item danger" type="button">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>退出登录</span>
              </button>
            </div>
          </div>
        </div>
      </header>

      <!-- Main Content Area -->
      <main id="main-content" class="app-content">
        <!-- Views will be mounted here -->
      </main>

    </div>

    <!-- Floating Data Consultation Assistant -->
    <div id="ai-assistant-root">
      <button id="ai-assistant-fab" class="ai-fab" type="button" aria-label="数据咨询助手">
        <i class="fa-solid fa-comments"></i>
      </button>

      <section id="ai-assistant-window" class="ai-window hidden" aria-label="数据咨询会话">
        <header id="ai-window-header" class="ai-window-header">
          <div class="ai-window-title">
            <i class="fa-solid fa-sparkles"></i>
            <div>
              <strong>数据咨询助手</strong>
            </div>
          </div>
          <div class="ai-window-actions">
            <button id="ai-new-chat" type="button" class="ai-tool-button" title="新建对话">
              <i class="fa-solid fa-plus"></i>
            </button>
            <button id="ai-fullscreen" type="button" class="ai-tool-button" title="全屏">
              <i class="fa-solid fa-expand"></i>
            </button>
            <button id="ai-close" type="button" class="ai-tool-button" title="关闭">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>
        </header>

        <div class="ai-window-body">
          <aside class="ai-history">
            <div class="ai-history-head">
              <span>历史会话</span>
            </div>
            <div id="ai-history-list" class="ai-history-list"></div>
          </aside>

          <main class="ai-chat">
            <div id="ai-chat-messages" class="ai-chat-messages"></div>
            <div id="ai-preview-panel" class="ai-preview-panel hidden"></div>
            <form id="ai-chat-form" class="ai-chat-form">
              <div class="ai-input-row">
                <input id="ai-question" type="text" placeholder="请输入查询年月与门店名称，检索对应门店 POS 数据" aria-label="咨询内容" autocomplete="off">
                <button type="submit">
                  <i class="fa-solid fa-paper-plane"></i>
                  发送
                </button>
              </div>
            </form>
          </main>
        </div>
      </section>
    </div>
  </div>

  <!-- Login View Container -->
  <div id="login-container" class="h-screen w-screen flex items-center justify-center relative overflow-hidden px-4 login-shell">
    <!-- Subtle tech dots background -->
    <div class="absolute inset-0 z-0 opacity-[0.03]" style="background-image: radial-gradient(#2563eb 1.5px, transparent 1.5px); background-size: 32px 32px;"></div>
    
    <!-- Decorative abstract blobs -->
    <div class="absolute -top-24 -right-24 w-96 h-96 bg-brand/10 rounded-full blur-3xl z-0"></div>
    <div class="absolute -bottom-24 -left-24 w-96 h-96 bg-blue-400/10 rounded-full blur-3xl z-0"></div>

    <div id="login-view-slot" class="relative z-10 w-full flex items-center justify-center"></div>
    <div class="absolute bottom-8 text-slate-400 text-xs font-medium z-10">
      Copyright 2019 by ORION. All right reserved
    </div>
  </div>

  <!-- Global Overlay (Dialog, Drawer, Toast) -->
  <div id="overlay-container"></div>

  <!-- Scripts -->
  <script src="js/core/store.js?v=20260624-user-menu"></script>
  <script src="js/core/global-period.js?v=20260611-global-period"></script>
  <script src="js/core/i18n.js?v=20260630-inbox-status"></script>
  <script src="js/components/dialog.js?v=20260611-merge"></script>
  <script src="js/components/drawer.js?v=20260611-merge"></script>
  <script src="js/components/ai-assistant.js?v=20260626-ai-fab-drag"></script>
  <script src="js/views/login.js?v=20260630-password-toggle"></script>
  <script src="js/views/dashboard.js?v=20260624-remove-dashboard-action"></script>
  <script src="js/views/ingestion.js?v=20260704-upload-period"></script>
  <script src="js/views/qa.js?v=20260701-global-document-detail"></script>
  <script src="js/views/ledger.js?v=20260701-global-document-detail"></script>
  <script src="js/views/settings.js?v=20260706-org-cascader-fix"></script>
  <script src="js/core/app.js?v=20260629-settings-fields"></script>
<script>
(function () {
  const STATUS_OPTIONS = ['全部状态', '正常', '驳回', '覆盖'];
  const REMOVED_CHILD_ACTIONS = new Set(['覆盖', '忽略', '归档', '暂存', '移动到归档', '移动到暂存']);

  function isFileBoxActive() {
    const tab = document.getElementById('tab-original');
    return Boolean(tab && tab.textContent.includes('文件箱') && tab.className.includes('active'));
  }

  function removeParentStatusColumn(table) {
    const headRow = table.querySelector(':scope > thead > tr');
    if (!headRow) return;

    const statusIndex = Array.from(headRow.children).findIndex((cell) => cell.textContent.trim() === '状态');
    if (statusIndex < 0) return;

    headRow.children[statusIndex].remove();
    table.querySelectorAll(':scope > tbody > tr.inbox-master-row').forEach((row) => {
      const cell = row.children[statusIndex];
      if (cell) cell.remove();
    });
  }

  function normalizeDuplicateStatus(row) {
    const text = row.textContent || '';
    const isDuplicate = text.includes('原始门店数据列表中有重复') || text.includes('重复');
    if (!isDuplicate) return;

    row.querySelectorAll('td, span').forEach((node) => {
      if (node.textContent.trim() === '待处理') {
        node.textContent = '重复';
        node.classList.remove('text-amber-600', 'bg-amber-50', 'border-amber-100');
        node.classList.add('text-orange-600', 'bg-orange-50', 'border-orange-100');
      }
    });
  }

  function removeChildOnlyActions(table) {
    table.querySelectorAll('.inbox-att-reject-btn').forEach((button) => button.remove());
    table.querySelectorAll('button, a').forEach((node) => {
      if (REMOVED_CHILD_ACTIONS.has(node.textContent.trim())) node.remove();
    });
    table.querySelectorAll('tr').forEach(normalizeDuplicateStatus);
  }

  function normalizeStatusButton() {
    const button = document.getElementById('inbox-status-btn');
    if (!button) return;

    const selected = button.textContent.trim();
    if (!STATUS_OPTIONS.includes(selected)) {
      const label = button.querySelector('span') || button;
      label.childNodes.forEach((node) => {
        if (node.nodeType === Node.TEXT_NODE) node.textContent = '';
      });
      label.prepend('全部状态');
    }
  }

  function normalizeStatusDropdown() {
    const labelsToRemove = new Set(['待处理', '已处理', '重复']);
    document.querySelectorAll('button, [role="option"], [role="menuitem"]').forEach((node) => {
      const label = node.textContent.trim();
      if (labelsToRemove.has(label)) node.remove();
    });
  }

  function normalizeFileBox() {
    if (!location.hash.includes('ingestion') || !isFileBoxActive()) return;

    const table = document.getElementById('inbox-table');
    if (!table) return;

    removeParentStatusColumn(table);
    removeChildOnlyActions(table);
    normalizeStatusButton();
  }

  window.addEventListener('DOMContentLoaded', normalizeFileBox);
  window.addEventListener('hashchange', () => setTimeout(normalizeFileBox, 50));
  document.addEventListener('click', () => setTimeout(() => {
    normalizeFileBox();
    normalizeStatusDropdown();
  }, 50));

  const observer = new MutationObserver(() => normalizeFileBox());
  observer.observe(document.documentElement, { childList: true, subtree: true });
})();
</script>
</body>
</html>
